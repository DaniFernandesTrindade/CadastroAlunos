<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Sistema de Cadastro de Alunos</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>

    <div class="logo">
        <h1>SENAI</h1>
        <span>Sistema Escolar</span>
    </div>

    <div class="usuario">
        Secretaria Acadêmica
    </div>

</header>

<section class="banner">

    <div class="texto-banner">

        <h2>Cadastro de Alunos</h2>

        <p>
            Sistema de gerenciamento de estudantes
            com pesquisa inteligente e cadastro em tempo real.
        </p>

    </div>

</section>

<main>

<div class="container">

    <div class="card">

        <h2>Novo Aluno</h2>

        <form id="formAluno">

            <div class="grupo">

                <label>Nome Completo</label>
                <input
                    type="text"
                    id="nome"
                    placeholder="Digite o nome do aluno"
                    required>

            </div>

            <div class="linha">

                <div class="grupo">

                    <label>Idade</label>
                    <input
                        type="number"
                        id="idade"
                        placeholder="Idade"
                        required>

                </div>

                <div class="grupo">

                    <label>Turma</label>

                    <select id="turma">

                        <option>DS1</option>
                        <option>DS2</option>
                        <option>DS3</option>
                        <option>MEC1</option>
                        <option>MEC2</option>

                    </select>

                </div>

            </div>

            <div class="grupo">

                <label>Curso</label>

                <select id="curso">

                    <option>Desenvolvimento de Sistemas</option>
                    <option>Eletrotécnica</option>
                    <option>Mecânica</option>
                    <option>Automação</option>
                    <option>Logística</option>

                </select>

            </div>

            <div class="linha">

                <div class="grupo">

                    <label>Telefone</label>

                    <input
                        type="text"
                        id="telefone"
                        placeholder="(21)99999-9999">

                </div>

                <div class="grupo">

                    <label>Data de Nascimento</label>

                    <input
                        type="date"
                        id="data">

                </div>

            </div>

            <div class="grupo">

                <label>E-mail</label>

                <input
                    type="email"
                    id="email"
                    placeholder="email@senai.com">

            </div>

            <button type="submit">

                Cadastrar Aluno

            </button>

        </form>

    </div>

    <div class="card">

        <h2>Pesquisar Alunos</h2>

        <input
            type="text"
            id="pesquisa"
            placeholder="Digite o nome do aluno...">

        <div class="tabela">

            <table>

                <thead>

                <tr>

                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Curso</th>
                    <th>Turma</th>
                    <th>Telefone</th>

                </tr>

                </thead>

                <tbody id="listaAlunos">

                </tbody>

            </table>

        </div>

    </div>

</div>

</main>

<footer>

    Sistema Acadêmico SENAI © 2026

</footer>

<script src="script.js"></script>

</body>
</html>
